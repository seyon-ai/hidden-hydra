<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Join — Hidden Hydra</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
<div id="toasts"></div>
<div class="login-page">
  <div class="login-left">
    <a href="index.html" class="back-link">← Back</a>
    <div class="brand">
      <div class="brand-icon">🐉</div>
      <h1>HIDDEN<br>HYDRA</h1>
      <p class="tagline">Where shadows speak</p>
    </div>
    <div class="testimonial">
      <div class="tq">"Connected me with people I never would have met."</div>
      <div class="ta">🦊 shadow_wolf · Tokyo</div>
    </div>
  </div>
  <div class="login-right">
    <div class="login-card">

      <!-- Step 1 -->
      <div class="step active" id="step1">
        <div class="step-dots">
          <div class="sd active">1</div><div class="sl"></div>
          <div class="sd">2</div><div class="sl"></div>
          <div class="sd">3</div>
        </div>
        <h2 class="step-title">Choose Identity</h2>
        <p class="step-sub">Pick an avatar or upload a photo</p>
        <div class="av-stage">
          <div class="av-big" id="av-big" onclick="document.getElementById('photo-inp').click()">
            <span id="av-show">🐉</span>
            <div class="av-hint">UPLOAD</div>
          </div>
          <input type="file" id="photo-inp" accept="image/*" style="display:none">
          <button class="btn-ghost" style="font-size:11px;padding:8px 14px" onclick="document.getElementById('photo-inp').click()">📸 Upload Photo</button>
        </div>
        <div class="emoji-grid" id="emoji-grid"></div>
        <div class="color-row">
          <span style="font-size:9px;letter-spacing:2px;color:var(--dim);font-family:'Cinzel',serif">COLOR</span>
          <div class="swatches" id="swatches"></div>
        </div>
        <button class="btn-gold" style="width:100%;justify-content:center;margin-bottom:8px" onclick="goStep(2)">Continue →</button>
        <button class="btn-ghost" style="width:100%;text-align:center" onclick="quickJoin()">⚡ 1-Click Quick Join</button>
      </div>

      <!-- Step 2 -->
      <div class="step" id="step2">
        <div class="step-dots">
          <div class="sd done">✓</div><div class="sl active"></div>
          <div class="sd active">2</div><div class="sl"></div>
          <div class="sd">3</div>
        </div>
        <h2 class="step-title">Your Details</h2>
        <p class="step-sub">Tell the world who you are</p>
        <div class="ig"><label>USERNAME *</label>
          <input class="ii" id="inp-user" placeholder="shadow_wolf" maxlength="24">
          <div class="hint" id="user-hint"></div>
        </div>
        <div class="ig"><label>BIO</label>
          <input class="ii" id="inp-bio" placeholder="A wanderer of the digital realm..." maxlength="80">
        </div>
        <div class="ig"><label>COUNTRY</label>
          <select class="ii" id="inp-country"></select>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-ghost" onclick="goStep(1)">← Back</button>
          <button class="btn-gold" style="flex:1;justify-content:center" onclick="goStep(3)">Continue →</button>
        </div>
      </div>

      <!-- Step 3 -->
      <div class="step" id="step3">
        <div class="step-dots">
          <div class="sd done">✓</div><div class="sl active"></div>
          <div class="sd done">✓</div><div class="sl active"></div>
          <div class="sd active">3</div>
        </div>
        <h2 class="step-title">Ready to Enter</h2>
        <p class="step-sub">Your profile preview</p>
        <div class="preview-card">
          <div class="pav" id="pav"></div>
          <div>
            <div class="pname" id="pname">—</div>
            <div class="pbio"  id="pbio">—</div>
            <div class="pbio"  id="pcountry">—</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-ghost" onclick="goStep(2)">← Back</button>
          <button class="btn-gold" id="enter-btn" style="flex:1;justify-content:center" onclick="createProfile()">
            <span id="enter-txt">ENTER 🐉</span>
            <div class="ring sm" id="enter-spin" style="display:none;border-top-color:var(--bg)"></div>
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
import { auth, db, rtdb, signInAnonymously, onAuthStateChanged,
         doc, setDoc, getDoc, serverTimestamp,
         ref, set, rtTs } from './firebase-config.js';

const EMOJIS  = ['🐉','🦊','🐺','🦁','🐯','🦋','🔥','⚡','🌙','💎','🌊','🦅','🐬','🦝','🎭','🌸','🐙','🦄','⭐','🗡️'];
const COLORS  = ['#C9A84C','#C0392B','#8E44AD','#2980B9','#16A085','#D35400','#E91E63','#00BCD4'];
const COUNTRIES = [
  '🌍 Global','🇺🇸 USA','🇬🇧 UK','🇮🇳 India','🇵🇰 Pakistan','🇧🇩 Bangladesh',
  '🇩🇪 Germany','🇫🇷 France','🇯🇵 Japan','🇨🇳 China','🇧🇷 Brazil','🇷🇺 Russia',
  '🇰🇷 Korea','🇸🇦 Saudi Arabia','🇦🇪 UAE','🇨🇦 Canada','🇦🇺 Australia',
  '🇲🇽 Mexico','🇹🇷 Turkey','🇮🇹 Italy','🇪🇸 Spain','🇵🇭 Philippines',
  '🇵🇱 Poland','🇺🇦 Ukraine','🇸🇬 Singapore','🇳🇬 Nigeria','🇮🇩 Indonesia'
];

let selEmoji = EMOJIS[0], selColor = COLORS[0], photoURL = null;

function toast(msg,type=''){const tc=document.getElementById('toasts');const t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;tc.appendChild(t);setTimeout(()=>t.remove(),3200);}

// Build emoji grid
const eg = document.getElementById('emoji-grid');
EMOJIS.forEach(e=>{
  const d=document.createElement('div'); d.className='eg-item'+(e===selEmoji?' on':''); d.textContent=e;
  d.onclick=()=>{selEmoji=e;document.querySelectorAll('.eg-item').forEach(x=>x.classList.remove('on'));d.classList.add('on');if(!photoURL)document.getElementById('av-show').textContent=e;};
  eg.appendChild(d);
});

// Build color swatches
const sw=document.getElementById('swatches');
COLORS.forEach(c=>{
  const d=document.createElement('div');d.className='sw'+(c===selColor?' on':'');d.style.background=c;
  d.onclick=()=>{selColor=c;sw.querySelectorAll('.sw').forEach(x=>x.classList.remove('on'));d.classList.add('on');};
  sw.appendChild(d);
});

// Build country select
const cs=document.getElementById('inp-country');
COUNTRIES.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cs.appendChild(o);});

// Photo upload
document.getElementById('photo-inp').addEventListener('change', async e=>{
  const file=e.target.files[0]; if(!file) return;
  toast('Uploading photo...');
  try {
    const fd=new FormData(); fd.append('file',file); fd.append('upload_preset','hidden Hydra');
    const r=await fetch('https://api.cloudinary.com/v1_1/dyspzzb3z/image/upload',{method:'POST',body:fd});
    const d=await r.json();
    if(d.secure_url){
      photoURL=d.secure_url;
      const av=document.getElementById('av-big'); av.innerHTML='';
      const img=new Image(); img.src=photoURL; img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';
      const hint=document.createElement('div'); hint.className='av-hint'; hint.textContent='CHANGE';
      av.appendChild(img); av.appendChild(hint);
      toast('Photo ready!','ok');
    } else toast('Upload failed','err');
  } catch(err){ toast('Upload error: '+err.message,'err'); }
});

// Redirect if already has profile
onAuthStateChanged(auth, async user=>{
  if(user){ const s=await getDoc(doc(db,'users',user.uid)); if(s.exists()) window.location.href='chat.html'; }
});

window.goStep = function(n){
  if(n===3){
    const u=document.getElementById('inp-user').value.trim();
    if(!u||u.length<2){ toast('Username must be at least 2 characters','err'); return; }
    const pav=document.getElementById('pav'); pav.innerHTML='';
    if(photoURL){ const img=new Image(); img.src=photoURL; img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%'; pav.appendChild(img); }
    else pav.textContent=selEmoji;
    document.getElementById('pname').textContent=u;
    document.getElementById('pbio').textContent=document.getElementById('inp-bio').value||'No bio';
    document.getElementById('pcountry').textContent=document.getElementById('inp-country').value;
  }
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
};

window.createProfile = async function(){
  const username=document.getElementById('inp-user').value.trim();
  const bio=document.getElementById('inp-bio').value.trim();
  const country=document.getElementById('inp-country').value;
  if(!username||username.length<2){ toast('Username too short','err'); return; }
  const btn=document.getElementById('enter-btn');
  const txt=document.getElementById('enter-txt');
  const spin=document.getElementById('enter-spin');
  btn.disabled=true; txt.style.display='none'; spin.style.display='inline-block';
  try {
    let user=auth.currentUser;
    if(!user){ const c=await signInAnonymously(auth); user=c.user; }
    await setDoc(doc(db,'users',user.uid),{
      uid:user.uid, username, bio, country,
      avatar:selEmoji, color:selColor,
      photoURL:photoURL||'', friends:[],
      createdAt:serverTimestamp(), online:true
    });
    await set(ref(rtdb,`presence/${user.uid}`),{online:true,uid:user.uid,lastSeen:rtTs()});
    window.location.href='chat.html';
  } catch(e){ toast('Error: '+e.message,'err'); btn.disabled=false; txt.style.display='inline'; spin.style.display='none'; }
};

window.quickJoin = function(){
  const adjs=['shadow','void','ember','frost','lunar','cosmic','neon','iron','dark','silent'];
  const nouns=['wolf','hydra','spark','raven','echo','flux','drift','veil','ghost','phantom'];
  document.getElementById('inp-user').value=adjs[Math.floor(Math.random()*adjs.length)]+'_'+nouns[Math.floor(Math.random()*nouns.length)];
  window.goStep(3); setTimeout(window.createProfile,50);
};
</script>
</body>
</html>
