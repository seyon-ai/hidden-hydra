<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Profile — Hidden Hydra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Raleway:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <div id="auth-loading" style="position:fixed;inset:0;background:#05050A;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px">
    <div style="font-size:52px;animation:pulse 2s infinite">🐉</div>
    <div class="loader-ring"></div>
  </div>

  <div id="profile-app" style="display:none">
    <div class="profile-bg"><div class="profile-bg-glow"></div></div>

    <nav class="profile-nav">
      <button class="back-btn" onclick="window.location.href='chat.html'">← Back to Chat</button>
      <div class="nav-logo"><span>🐉</span> HIDDEN HYDRA</div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </nav>

    <div class="profile-hero">
      <div class="profile-av-wrap">
        <div class="profile-av-big" id="profile-av-big"></div>
        <button class="change-photo-btn" onclick="document.getElementById('profile-photo-inp').click()">📸 Change Photo</button>
        <input type="file" id="profile-photo-inp" accept="image/*" style="display:none">
      </div>
      <div class="profile-hero-info">
        <div class="profile-username" id="profile-username">—</div>
        <div class="profile-bio" id="profile-bio">—</div>
        <div class="profile-country" id="profile-country">—</div>
        <div class="profile-joined" id="profile-joined">Joined recently</div>
      </div>
    </div>

    <div class="profile-edit-card">
      <div class="pec-title">EDIT PROFILE</div>
      <div class="pec-grid">
        <div class="input-group"><label>USERNAME</label><input class="luxury-input" id="edit-username" maxlength="24" placeholder="Your name..."></div>
        <div class="input-group"><label>BIO</label><input class="luxury-input" id="edit-bio" maxlength="80" placeholder="Tell your story..."></div>
        <div class="input-group"><label>COUNTRY</label><select class="luxury-input luxury-select" id="edit-country"></select></div>
        <div class="input-group"><label>AVATAR EMOJI</label><div class="mini-emoji-grid" id="mini-emoji-grid"></div></div>
        <div class="input-group"><label>ACCENT COLOR</label><div class="color-swatches" id="edit-color-swatches"></div></div>
      </div>
      <div class="pec-actions">
        <button class="btn-save" onclick="saveProfile()">
          <span id="save-text">SAVE CHANGES</span>
          <div class="btn-loader" id="save-loader" style="display:none"></div>
        </button>
        <button class="btn-danger" onclick="logout()">SIGN OUT</button>
      </div>
    </div>

    <div class="profile-stats-row">
      <div class="pstat"><div class="pstat-num" id="stat-dms">—</div><div class="pstat-label">Conversations</div></div>
      <div class="pstat"><div class="pstat-num" id="stat-groups">—</div><div class="pstat-label">Groups</div></div>
      <div class="pstat"><div class="pstat-num">∞</div><div class="pstat-label">Messages Sent</div></div>
    </div>
  </div>

  <div id="toast-container" style="position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:8px;align-items:center"></div>

  <script type="module" src="profile.js"></script>
</body>
</html>
