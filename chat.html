<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chat — Hidden Hydra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Raleway:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <div id="auth-loading" style="position:fixed;inset:0;background:#05050A;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px">
    <div style="font-size:52px;animation:pulse 2s infinite">🐉</div>
    <div class="loader-ring"></div>
    <div style="font-family:'Cinzel',serif;color:var(--gold);letter-spacing:4px;font-size:11px">ENTERING THE HYDRA</div>
  </div>

  <div id="app" style="display:none">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="my-profile-row">
          <div class="my-av" id="my-av-el"></div>
          <div class="my-info">
            <div class="my-username" id="my-username-el">Loading...</div>
            <div class="my-status"><span class="online-pulse"></span>Online</div>
          </div>
          <button class="icon-btn" title="Profile" onclick="openProfilePage()">👤</button>
          <button class="icon-btn" title="Sign out" onclick="logout()">⎋</button>
        </div>
        <div class="sidebar-tabs">
          <button class="stab active" data-tab="dms" onclick="switchTab('dms',this)">DMs</button>
          <button class="stab" data-tab="groups" onclick="switchTab('groups',this)">Groups</button>
          <button class="stab" data-tab="explore" onclick="switchTab('explore',this)">Explore</button>
        </div>
        <div class="sidebar-search">
          <span class="s-icon">🔍</span>
          <input type="text" id="search-inp" placeholder="Search users, groups..." oninput="handleSearch(this.value)">
          <button class="s-clear" id="s-clear" onclick="clearSearch()" style="display:none">×</button>
        </div>
      </div>
      <div class="chat-list" id="chat-list">
        <div class="list-loading"><div class="loader-ring small"></div></div>
      </div>
      <button class="new-group-fab" id="new-group-fab" onclick="openCreateGroup()" style="display:none" title="Create Group">＋</button>
    </aside>

    <main class="chat-main" id="chat-main">
      <div class="empty-state" id="empty-state">
        <div class="es-dragon">🐉</div>
        <h2>HIDDEN HYDRA</h2>
        <p>Select a chat or explore users to begin</p>
        <div class="es-buttons">
          <button onclick="switchTab('explore',document.querySelector('[data-tab=explore]'))">🔍 Explore Users</button>
          <button onclick="openCreateGroup()">＋ Create Group</button>
        </div>
      </div>

      <div class="chat-view" id="chat-view" style="display:none">
        <div class="chat-header" id="chat-header">
          <button class="back-to-list" onclick="closeChatView()">←</button>
          <div class="ch-avatar" id="ch-av"></div>
          <div class="ch-info">
            <div class="ch-name" id="ch-name">—</div>
            <div class="ch-sub" id="ch-sub">—</div>
          </div>
          <div class="ch-actions">
            <button class="icon-btn" id="ch-info-btn" title="Info">ℹ</button>
          </div>
        </div>

        <div class="messages-wrap" id="messages-wrap">
          <div class="msgs-loading"><div class="loader-ring"></div></div>
        </div>

        <div class="typing-area" id="typing-area" style="display:none">
          <div class="typing-dots"><span></span><span></span><span></span></div>
          <span class="typing-text" id="typing-text">Someone is typing</span>
        </div>

        <div class="reply-bar" id="reply-bar" style="display:none">
          <div class="reply-content">
            <span class="reply-icon">↩</span>
            <div>
              <div class="reply-sender" id="reply-sender"></div>
              <div class="reply-preview" id="reply-preview-text"></div>
            </div>
          </div>
          <button class="reply-close" onclick="cancelReply()">×</button>
        </div>

        <div class="input-area">
          <button class="icon-btn emoji-toggle" onclick="toggleEmojiPicker()" title="Emoji">😊</button>
          <textarea class="msg-textarea" id="msg-textarea"
            placeholder="Speak in the shadows..."
            rows="1"
            oninput="autoResize(this);handleTyping()"
            onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" onclick="sendMessage()" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
          </button>
        </div>

        <div class="emoji-picker-panel" id="emoji-panel" style="display:none">
          <div class="ep-grid" id="ep-grid"></div>
        </div>
      </div>
    </main>

    <aside class="right-panel" id="right-panel">
      <div class="rp-header"><span class="online-pulse"></span><span>Online Now</span></div>
      <div class="rp-list" id="rp-list">
        <div class="list-loading"><div class="loader-ring small"></div></div>
      </div>
    </aside>
  </div>

  <div id="modals"></div>
  <div id="toast-container" style="position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:8px;align-items:center"></div>

  <script type="module" src="chat.js"></script>
</body>
</html>
