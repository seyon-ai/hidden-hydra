<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chat — Hidden Hydra</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="chat.css">
</head>
<body>

<div id="loading" class="loading-screen">
  <div style="font-size:52px;animation:pulse 2s infinite">🐉</div>
  <div class="ring"></div>
  <div class="loading-txt">ENTERING THE HYDRA</div>
</div>

<div id="app">
  <!-- SIDEBAR -->
  <aside id="sb" class="sidebar">
    <div class="sb-header">
      <div class="me-row" onclick="goProfile()">
        <div class="me-av" id="me-av"></div>
        <div class="me-info">
          <div class="me-name" id="me-name">—</div>
          <div class="me-status"><span class="pulse"></span>Online</div>
        </div>
        <button class="ib" title="Profile"  onclick="event.stopPropagation();goProfile()">👤</button>
        <button class="ib" title="Sign out" onclick="event.stopPropagation();doLogout()">⎋</button>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="world"   onclick="switchTab('world',this)">🌍</button>
        <button class="tab"        data-tab="dms"     onclick="switchTab('dms',this)">DMs</button>
        <button class="tab"        data-tab="groups"  onclick="switchTab('groups',this)">Groups</button>
        <button class="tab"        data-tab="explore" onclick="switchTab('explore',this)">Explore</button>
        <button class="tab"        data-tab="req"     onclick="switchTab('req',this)" style="position:relative">
          Req<span class="req-badge" id="req-badge">0</span>
        </button>
      </div>
      <div class="sb-search">
        <span>🔍</span>
        <input type="text" id="search-inp" placeholder="Search..." oninput="doSearch(this.value)">
        <button id="sc-clear" onclick="clearSearch()" style="display:none;background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px">×</button>
      </div>
    </div>
    <div class="chat-list" id="cl"></div>
    <button class="fab" id="fab" onclick="openCreateGroup()" style="display:none">＋</button>
  </aside>

  <!-- MAIN -->
  <main class="chat-main">
    <!-- Empty state -->
    <div class="empty-state" id="empty">
      <div style="font-size:72px;animation:float 5s ease-in-out infinite;margin-bottom:20px;filter:drop-shadow(0 0 20px rgba(201,168,76,.2))">🐉</div>
      <h2 style="font-family:'Cinzel',serif;font-size:22px;color:var(--faint);letter-spacing:6px;margin-bottom:10px">HIDDEN HYDRA</h2>
      <p style="font-size:13px;color:var(--faint);letter-spacing:1px;margin-bottom:24px">Select a chat or explore people</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <button class="btn-ghost" style="font-size:12px" onclick="switchTab('explore',document.querySelector('[data-tab=explore]'))">🔍 Explore</button>
        <button class="btn-ghost" style="font-size:12px" onclick="openCreateGroup()">＋ Create Group</button>
      </div>
    </div>

    <!-- Chat view -->
    <div class="chat-view" id="cv">
      <div class="ch-header">
        <button class="back-btn" onclick="closeCv()">←</button>
        <div class="ch-av" id="ch-av"></div>
        <div style="flex:1;min-width:0">
          <div class="ch-name" id="ch-name">—</div>
          <div class="ch-sub"  id="ch-sub">—</div>
        </div>
        <button class="ib" id="info-btn" style="display:none" onclick="openGroupInfo()">ℹ</button>
      </div>

      <div class="msgs" id="msgs"></div>

      <div class="typing-row" id="typing-row" style="visibility:hidden">
        <div class="tdots"><span></span><span></span><span></span></div>
        <span id="typing-txt" class="typing-txt"></span>
      </div>

      <div class="reply-bar" id="reply-bar">
        <span style="color:var(--gold);font-size:13px;flex-shrink:0">↩</span>
        <div style="flex:1;min-width:0">
          <div class="rb-sender" id="rb-sender"></div>
          <div class="rb-text"   id="rb-text"></div>
        </div>
        <button onclick="cancelReply()" style="background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;flex-shrink:0">×</button>
      </div>

      <div class="inp-wrap">
        <div class="ep-panel" id="ep">
          <div class="ep-grid" id="ep-grid"></div>
        </div>
        <div class="inp-row">
          <button class="ib" onclick="toggleEp()" title="Emoji" style="font-size:20px">😊</button>
          <textarea class="msg-ta" id="msg-ta"
            placeholder="Speak in the shadows..."
            rows="1"
            oninput="taResize(this);notifyTyping()"
            onkeydown="taKey(event)"></textarea>
          <button class="send-btn" onclick="sendMsg()">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- RIGHT PANEL -->
  <aside class="right-panel">
    <div class="rp-header"><span class="pulse"></span>Online Now</div>
    <div class="rp-list" id="rp-list"></div>
  </aside>
</div>

<div id="toasts"></div>
<div id="modals"></div>

<script type="module" src="chat.js"></script>
</body>
</html>
